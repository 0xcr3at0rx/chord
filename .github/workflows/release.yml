name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build release binaries and packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact_name: chord
            asset_name: chord-linux-x86_64
            bundle: true
          - target: aarch64-unknown-linux-gnu
            artifact_name: chord
            asset_name: chord-linux-aarch64
            bundle: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        run: |
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            sudo dpkg --add-architecture arm64
            # Fix Noble (24.04) sources to be amd64-only to avoid 404s when searching for arm64 on main mirrors
            if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
              sudo sed -i 's/^Architectures: .*/Architectures: amd64/g' /etc/apt/sources.list.d/ubuntu.sources || true
              if ! grep -q "Architectures: amd64" /etc/apt/sources.list.d/ubuntu.sources; then
                sudo sed -i 's/Types: deb/Types: deb\nArchitectures: amd64/' /etc/apt/sources.list.d/ubuntu.sources
              fi
            fi
            echo -e "Types: deb\nURIs: http://ports.ubuntu.com/ubuntu-ports\nSuites: noble noble-updates noble-security\nComponents: main restricted universe multiverse\nArchitectures: arm64" | sudo tee /etc/apt/sources.list.d/arm64.sources
            
            sudo apt-get update
            sudo apt-get install -y libasound2-dev:arm64 gcc-aarch64-linux-gnu pkg-config
            echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
            echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          else
            sudo apt-get update
            sudo apt-get install -y libasound2-dev pkg-config fuse libfuse2
          fi

      - name: Install Packaging Tools
        if: matrix.bundle == true
        run: |
          cargo install cargo-deb
          cargo install cargo-generate-rpm
          # Install linuxdeploy for AppImage
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage

      - name: Build
        run: |
          cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Create .deb package
        if: matrix.bundle == true
        run: |
          cargo deb --target ${{ matrix.target }} --no-build

      - name: Create .rpm package
        if: matrix.bundle == true
        run: |
          cargo generate-rpm --target ${{ matrix.target }}

      - name: Create AppImage
        if: matrix.bundle == true
        run: |
          mkdir -p AppDir/usr/bin
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} AppDir/usr/bin/
          # Create simple .desktop file and icon
          echo -e "[Desktop Entry]\nName=Chord\nExec=chord\nIcon=chord\nType=Application\nCategories=Audio;Music;" > AppDir/chord.desktop
          touch AppDir/chord.png # Placeholder icon
          ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage
          mv Chord-x86_64.AppImage chord-x86_64.AppImage

      - name: Prepare assets
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}
        shell: bash

      - name: Upload binaries and packages to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.asset_name }}
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/generate-rpm/*.rpm
            chord-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
