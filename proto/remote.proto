syntax = "proto3";

package remote;

// -------------------------------------------------------------------
// 1. Commands (Client -> Server/Renderer)
// -------------------------------------------------------------------

message RemoteCommand {
  oneof command {
    // Playback Control
    string play_track_id = 1;
    string play_radio_url = 2;
    bool toggle_playback = 3;
    bool next_track = 4;
    bool prev_track = 5;
    float set_volume = 6;
    bool stop = 7;
    string transfer_playback_to = 8;
    bool set_mute = 13;
    PlaybackMode set_playback_mode = 14;
    uint32 seek_to_ms = 15;
    
    // Streaming & Data
    StreamSetup stream_setup = 17;
    StreamData stream_packet = 9;
    
    // Library & Navigation
    BrowseRequest browse_request = 10;
    QueueRequest queue_request = 11;
    
    // System
    Capabilities capabilities = 12;
    SyncRequest sync_request = 16;
  }
}

enum PlaybackMode {
    NORMAL = 0;
    REPEAT_TRACK = 1;
    REPEAT_ALL = 2;
    SHUFFLE = 3;
}

enum AudioFormat {
  UNKNOWN_FORMAT = 0;
  PCM = 1;
  FLAC = 2;
  OPUS = 3;
  ALAC = 4;
  MP3 = 5;
  AAC = 6;
  OGG = 7;
  WAV = 8;
}

// -------------------------------------------------------------------
// 2. High-Res Audio Streaming
// -------------------------------------------------------------------

// Sent once before a stream starts to negotiate format and set up decoder
message StreamSetup {
  uint32 stream_id = 1;
  uint32 sample_rate = 2;
  uint32 channels = 3;
  AudioFormat format = 4;
  uint32 bit_depth = 5;
}

// Highly optimized packet sent constantly during playback
message StreamData {
  uint32 stream_id = 1;
  uint32 sequence = 2;
  uint64 timestamp_us = 3; // For PTP-based synchronization
  bytes data = 4;          // Raw payload
}

// -------------------------------------------------------------------
// 3. Status & Events (Server/Renderer -> Client)
// -------------------------------------------------------------------

message RemoteEvent {
  oneof event {
    RemoteStatus status = 1;
    BrowseResponse browse_response = 2;
    SyncResponse sync_response = 3;
    string error_message = 4;
  }
}

message RemoteStatus {
  optional string current_track_id = 1;
  bool is_playing = 2;            // Legacy support
  float progress = 3;             // 0.0 to 1.0
  float volume = 4;
  
  string title = 5;
  string artist = 6;
  
  string device_name = 7;
  string device_id = 8;
  
  repeated string queue_ids = 9;
  
  // Extended state
  PlaybackState state = 10;
  uint32 position_ms = 11;        // Absolute position in ms
  bool is_muted = 12;
  string album = 13;
  string cover_art_hash = 14;
  PlaybackMode playback_mode = 15;
}

enum PlaybackState {
  STOPPED = 0;
  PLAYING = 1;
  PAUSED = 2;
  BUFFERING = 3;
  ERROR = 4;
}

// -------------------------------------------------------------------
// 4. Discovery (UDP Broadcast)
// -------------------------------------------------------------------

message DeviceInfo {
  string name = 1;
  string id = 2;
  string address = 3;
  uint32 port = 4;
  string version = 5;         // e.g., "1.2.8"
  DeviceRole role = 6;
}

enum DeviceRole {
  UNKNOWN_ROLE = 0;
  RENDERER = 1;     // Can play audio
  CONTROLLER = 2;   // Can control others
  SERVER = 3;       // Hosts library
  COMBO = 4;        // Server + Renderer + Controller
}

// -------------------------------------------------------------------
// 5. Library Browsing & Queue Management
// -------------------------------------------------------------------

message BrowseRequest {
  enum Type {
    ROOT = 0;
    PLAYLISTS = 1;
    TRACKS = 2;
    SEARCH = 3;
    ALBUMS = 4;
    ARTISTS = 5;
  }
  Type type = 1;
  string id = 2;     // Playlist ID, Album ID, or search query
  uint32 offset = 3; // Pagination
  uint32 limit = 4;
}

message BrowseResponse {
  repeated TrackInfo tracks = 1;
  repeated PlaylistInfo playlists = 2;
  repeated AlbumInfo albums = 3;
  repeated ArtistInfo artists = 4;
  uint32 total_items = 5;
}

message TrackInfo {
  string id = 1;
  string title = 2;
  string artist = 3;
  string album = 4;
  uint32 duration_ms = 5;
  string genre = 6;
  uint32 track_number = 7;
  AudioFormat format = 8;
  uint32 sample_rate = 9;
  uint32 bit_depth = 10;
}

message PlaylistInfo {
  string id = 1;
  string name = 2;
  uint32 track_count = 3;
}

message AlbumInfo {
  string id = 1;
  string name = 2;
  string artist = 3;
  uint32 year = 4;
}

message ArtistInfo {
  string id = 1;
  string name = 2;
}

message QueueRequest {
  enum Action {
    ADD = 0;
    REMOVE = 1;
    CLEAR = 2;
    REORDER = 3;
    PLAY_NEXT = 4;
  }
  Action action = 1;
  string track_id = 2;
  uint32 index = 3; // Target index for REMOVE or REORDER
}

// -------------------------------------------------------------------
// 6. Capability Negotiation & Sync
// -------------------------------------------------------------------

message Capabilities {
  repeated AudioFormat supported_formats = 1;
  uint32 max_sample_rate = 2;
  uint32 max_bit_depth = 3;
  bool supports_multiroom = 4;
  uint32 max_buffer_size_bytes = 5;
  DeviceRole role = 6;
}

message SyncRequest {
  uint64 client_time_us = 1;
}

message SyncResponse {
  uint64 client_time_us = 1;
  uint64 server_time_us = 2;
}